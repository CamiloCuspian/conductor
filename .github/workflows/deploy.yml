# ─────────────────────────────────────────────────────────
# .github/workflows/deploy.yml — GitHub Actions para deploy
# ─────────────────────────────────────────────────────────
# JEKYLL vs ASTRO en GitHub Pages:
#
# Jekyll:  GitHub Pages lo construye AUTOMÁTICAMENTE al hacer push.
#          Solo subes el código y GitHub lo compila solo.
#          (Por eso Jekyll es tan fácil para GitHub Pages)
#
# Astro:   Necesitas este workflow porque GitHub Pages no entiende
#          Astro directamente. Este archivo le dice a GitHub:
#          "cuando haya un push, instala Node, compila Astro,
#          y sube la carpeta dist/ a GitHub Pages".
#
# ¿Es más complicado que Jekyll? Sí, pero solo hay que hacerlo una vez.
# La ventaja: mucho más poder (componentes, TypeScript, optimizaciones).
# ─────────────────────────────────────────────────────────

name: Deploy Astro a GitHub Pages

on:
  # Se ejecuta en cada push a la rama main
  push:
    branches: [main]
  # Permite ejecutarlo manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:

# Permisos necesarios para desplegar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo permite un deploy a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Compilar Astro
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instala Node.js (versión LTS)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # 3. Configura GitHub Pages (detecta la URL base automáticamente)
      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v4

      # 4. Instala dependencias (equivale a `npm install`)
      - name: Instalar dependencias
        run: npm ci

      # 5. Compila el sitio Astro → genera la carpeta dist/
      #    Equivale a `jekyll build` en Jekyll
      - name: Compilar Astro
        run: npm run build
        env:
          # Astro usa esto para generar las URLs correctas
          SITE: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      # 6. Sube los archivos compilados como "artefacto" de GitHub Actions
      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  # Carpeta de salida de Astro (Jekyll usa _site/)

  deploy:
    name: Desplegar en GitHub Pages
    needs: build   # Solo se ejecuta si el job "build" fue exitoso
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
